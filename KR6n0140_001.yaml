body:
  text: 清金陵西天禪寺元峯法師性起論釋嗣法門人善漳等録歸敬請加稽首慈氏佛如尊在目前如來已涅槃今日無請益故祈冥加力命筆成此論搜盡八識旨言言投祖意普利諸異生同證唯識性以斯淨妙善回向於淨土速見阿彌陀頓捨異熟盡今云八識者以一本散為萬殊故云唯識者萬殊為一本今云唯識者即黎耶識也以心外而無法也又唯者非他人之所成也唯我黎耶藏識之所生耳又唯者成也即根塵器界及轉識并心所法者總在藏識獨自成耳故問何以自成非他力也答如人墮餓鬼道見水成膿血或變成火故目連救母送飯變成火炭天人見水是琉璃魚成窟宅又善財參大光明王衆生在城中或見此城似琉璃或見此城中俱七寶成或見此城中是沙土木屋豈非是唯心業力各人之所現也是故自心業力強故者見種種各異非心外有色可見隨自心故何則以各人自心業力種強如餓鬼共一處住彼此不見似同一室成各夢故即為心也此通凡情唯心若佛果中成大光明藏是白淨識名曰毗盧遮那佛也所云八識者俱在心數非心所故云八識者一眼識二耳識三鼻識四舌識五身識六意識七末那識八阿黎耶識今識本無異名因用處各別故識帶數量謂帶數釋名今云五識者依根得名依眼得名故云眼識乃至依身得名故云身識名鄰近釋也又眼不是耳乃至耳不是身識即相違釋也又名依士釋以根劣仗識方見故名依士釋也如父仗子名力故又名依主釋識為能依根為所依故名依主釋又名持業有財六七八識中釋耳因玄祖始出八識母頌共四十八句分為四科解釋第一科五識轉成所作智頌十二句第二科六識轉妙觀察智頌十二句第三科七識轉平等性智頌十二句第四科八識轉大圓鏡智頌十二句四科中先論五識章十二句云第一五識頌中又分為二前八句凡情章後四句聖果章初頌凡情性境現量通三性眼耳身三二地居遍行別境善十一中二大八貪瞋癡五識同依淨色根九緣七八好相鄰合三離二觀塵世愚者難分識與根今論八句中初句云性境現量通三性論曰云何性境現量而通三性耶答所云性境者不改易為之性所對五塵為之境此之以性為境者謂地水火風以四大而為之性也境也問云何不改易性耶答地以堅固為性水以濕為性火以熱為性風以動為性以四大各云性者如火欲凉決不可得故風欲靜者不可得故下二義可知故云性不可易也又四大各遍無缺無餘故名四大又能生聲香味觸為之四微即能所八法共名為色聲香味觸由對四大故名四微色言色與四微即為之五塵性境收盡內之根身外之器界以至明暗顯色等方圓形色等行住坐臥有表色等總為第八識親疏相分是果報識性持也總以五識所緣性境而成現量境故是見相二分種子之所生也若未破無明迷性是遍計性所收若破迷性即依他起性相似雖有性是無也似依他性即圓成故現量者現謂顯現非過未故又如鏡光故量謂度量是率爾心如鏡照像不留情故現如影像量如鏡光耳又見相二分各有自種在八識種內一齊生者無前後際故云通三性者一善性二惡性三無記性所云性者種也以藏識中無始已來所熏善性種子惡性種子及無記性種子各性種子決不能改似若栴檀香與臭蒜決是各性是故觸境中或如惡人打鳥率爾心起即成現量一剎那際落意識中即成比量引善性種子即生慈念成善現行惡性種子觸五塵性境成現量落比量意識中生惡現行起隨喜善念惡念亦復然也故云性境以成現量而又成比量通善性惡性無記性各種生現行者乃至性境中觸十善境通現比二量或十惡境通現比二量若本無善惡種子故觸善境不生善惡境不生惡既無善惡現行種子名無記種也今七識中善惡現行熏在藏識內即成八識中引業種遷至當來必成善惡苦果樂果也是為當來異熱果耳故云通三性因果決無差也眼耳身三二地居論曰云何眼耳身三識只通初禪及二禪天耶即不通上界三禪四禪天耶答下欲界五趣雜居地中八識全俱初禪二禪天無欲界鼻舌二識捨段食故無香味塵今二地者只六識一眼識二耳識三身識四意識五末那識六即黎耶識又初禪具六識者由捨離欲界生得初禪喜又得淨妙樂故況有覺觀二心以常出定說法利益諸梵天衆二禪光音天衆雖無覺觀亦有喜心名定生喜樂地以得深定喜樂心故雖不常出定以光中示說法音故諸梵衆亦有眼耳身三識之境故云眼耳身三二地居者信矣又問初禪二禪可有尋伺二心所耶答初禪未入定前有尋有伺已入定後有伺無尋二禪唯伺無尋以有喜樂心豈無伺矣又問三禪可有眼耳身三識耶答唯在定中得受靜妙之樂故無三識伺心雖有細不現故四禪捨樂無想念滅意識全無伺所心故唯七識緣第八識成有覆無記性有真帶境以心緣心故以見分成影作境故若四空天以滅七識見分無真帶質故以無內外境故名四空天耳唯留第八藏識及五心所故若至非非天即無五心所以定入者止息心故只有計存我種未破無覆無明識性是故報盡還入輪回若能斷我種即捨生死成阿羅漢者此矣遍行別境善十一論曰遍行以八個識中與何識相應又別境云何不與遍行五心所同耶又善十一心所亦與何識相應耶答云五心所云遍行者以周遍行履一切地一切性一切心一切時循環來往無休息故又如微波亦如瀑流性名現識等流性故即觸作意受想思等五心所也以內外皆應酬故乃至四空天處尚相應故常無斷也故名遍行即有四義為之遍行所云四義者一遍一切地乃至四空天處常相應故名遍一切地下界則可知耳二遍一切性種以善惡種子觸境時即作意觸受想思五心所等常相應故無記性等即可知耳是故善惡無記三性盡皆應故名遍一切性三遍一切心即八個諸識心王內外應故如前作意觸境等生諸善惡無記心故名遍一切心耳四遍一切時即如水瀑流應時無休息故名遍一切時耳由此四義故名遍行也今云五心所者謂心王為能使心所為所使如父使子不相違故故名心所更有餘四十六個心所亦此義耳問五心所義即今知也但五心所各性各業作用其義云何答夫性者其各體種性不可改也其業用力各有能也其餘心所亦準例義均知今一一分開略為論釋問云何名觸心所耶答所云觸者謂有根塵識和合不帶名言得法自相故名曰觸又觸者以令心心所觸境為自性故受想思等為觸自業故名曰觸如眼識等觸即耳鼻舌身識觸等亦復然也成五觸耳問云何名作意心所耶答所云作意者謂能警諸心所如受想思等為自性故引起諸心所等為自業故名作意心如共一室以一人先惺驚惺衆心故所以作意最比餘力心所強故云何名受答所云受者謂領觸等作意心起故領納違順等境順者是樂境違者逆也是苦境也以領納違順等境為自性故起憎愛等心為自業故又不順不違等境即不苦不樂受為自性故不起憎愛等心為自業故名為受耳云何名想答云想者由前領受心所之境故于領受境上取像專繫為自性故復於所受境上施設名言為是有耶無耶善耶惡耶苦耶樂耶種種名種種言句為自業故即名為想即尋心為體耳云何名思答所云思者謂想心所希于境上由未定故故于想境上重又細察故名思耳以令餘心所緣境成善成惡等心所故故以伺心所為體耳以上想思尋伺是散位獨頭在後文中辨也若在八正道中即正見正思惟了明第一義故通聖心又如來三七思惟如是事恐先說最上乘衆生不信反招墮落也故名思耳以上釋五遍行心所各性各業力竟次釋五別境即欲勝解三摩地念慧等是五別境問云何各別境耶答與前五遍行心所性業不同如前五心所等由觸等故有作意受想思境起是故能遍一切諸善惡無記心故今此別境者以各別境起不通餘境緣故故為之別境耳問云何是五別境各有性耶業耶答一一示之云何名欲答欲者謂於所緣善等境希望為自性故惡境亦同心勤依善惡等境不改為業有欲者由愛即受不欲者即捨故非遍行是別境攝耳云何名勝解耶答勝解者於決定境上印持無謬故不改者為自性故或文義境中印持毫不錯謬他人不能惑亂為自性故以不可引轉轉于他境為自業故若猶豫者不成勝解別境若不猶豫故名別境非遍行者隨諸心故是別境攝云何得名念耶答所云念者於先所習之境令心明記不忘失故為自性耳定依所習之境不捨為自業故若受餘境即不成念故非遍行是別境攝云何名慧答所云觀境上以簡擇決斷分明為自性故以斷疑決信解為自業故或外道邪解雖不錯境著五蘊等斷常二見者是邪慧攝故非正見也既慧決擇不謬不轉餘法故非遍行是別境攝問在何識所收答雖在五識頌論此別境者通意識中收者亦非分外何則欲境可通五識是六識中成勝解雖或一見明了或五識亦六識中成何則非有決定思者何能印定者乎念若無意識持云何得成定若無意識云何專法一境慧若無意思量決擇故慧論不成亦通七識成邪慧故斯之不敢自專請高哲者究之無拘一定耳次論十一個善心所也問佛有無量大善豈可十一個心所而能成就者乎答在後文中辨夫善者美也故老子云尊言可以市加行可以人若不計其功者則為出世之善合此善云通漏無漏者淨妙果故問善十一法中云何通五識耶又云何各有自性各有業用者耶答十一善者一信二慚三愧四無貪念五無嗔六無癡問六善心所通五識耶答往昔中熏過善種故眼見耳聞觸生信八三寶故故知前所造過非見諸聖德即生慚愧不教而自懺故由向昔無貪無嗔無癡是故眼見耳聞觸境而無貪也嗔也癡也若有貪等種故無解脫性耳又五善心所者決定亦同五識相應亦通意識耳何則若勤精進有二一身不疾懈故屬身識二心不疲懈即兼意識若身心俱不疲懈故名精進不放逸者亦二一身不放逸如戒身口屬身識故二意不放逸者屬意識故十行捨者向日行捨觸境自捨不教自成故亦屬眼耳見聞行捨亦兼屬意十一不害向日由慈心益物習成故觸境生慈即不害也以上十一善心所古云屬五識論從多分中說以余論之亦兼意識無定準也問云各自性各自業當何義耶答一一示之問何謂為信答夫信者於實德深忍樂欲心淨為自己性對治不信斷疑為業故不信者是障聖道之根本信者謂八聖道之源由又生疑者有三一人天外道仙等執著我人等四相之蘊若聞深法即生疑謗故佛云破法不信故墮于三惡道也以不信力而障于道也二小乘聲聞及二乘獨覺不信大乘不得入佛智海力故三菩薩不信非不信也有疑網也如見道分不得入修道分疑網又修道分菩薩不得入證道分疑網又十地不見如來勝妙境者即為疑網以要重加精進力故始斷疑網得八法界故云信為道源功德母又云信能必到如來地者信矣問諸善中云何以信為首耶答前不云乎信為道源功德母由信力故而發起菩提之心故善財至參彌勒大士尚以信力菩提心為主始入普賢道場故信者如息塵珠而能息盡諸塵不障道法故如如意珠以隨心所求無不得故如利刀一切煩惱盡穿通故故十一善中以信而為首也二慚云何為慚耶答云慚者恥也以自向前有諸過非皆是無知而作今已知故即生慚也恥也故初地菩薩以慚愧二心乃為莊嚴故慚字是領善之首始生善法論云依自法力崇重賢聖為自性故止息惡行為自業故如一無垢比丘而犯淫戒凡見一切持戒諸沙彌等盡皆禮拜云我犯淫戒必墮地獄求諸衆僧與我懺罪慚也止息惡行也三愧云何為愧耶答夫言愧者凡自己有過見一切聖賢父母師長俱成有愧如人飲酒大醉墮于瀑臭泥中若惺之後一切眷屬悉不能見凡見外人者均皆有愧甚是羞也故名為愧故論云愧者依世間善力境中以輕拒諸惡為自性故如輕他惡即自己過故生愧也又對無愧止息惡行為自業故故人有慚愧者可以斷惡可以修善可以成聖至頓超十地斷障證真者皆由慚愧而得成也故曰人無慚愧衆惡皆成罪之首也況人有過而不懺乎是故未得見道者即見有道之人而生慚也愧也已見道者若見修道有德之人更生慚愧又修道之人若見證道之人更加生慚生愧方乃證耳十地果中若見如來果地不得證之痛生慚愧故慚愧至通聖位況我輩在三界內而不生慚愧者實可痛哉四無貪云何名無貪耶答云無貪者一外財二內財三眷屬四名五利六睡眠七淫欲八飲食九衣服十各塵美境十一心意識已上俱屬凡情十二聖見皆屬無貪中收但有一種不捨即不成大聖又前十種捨外色法後一種捨于心法又前十種捨于外境後二種捨于內境若不捨者即我愛煩惱及俱生我法種子之所收也若捨者名無貪也問既云無貪即是捨義何必後立行捨答無貪屬心行捨屬境由內心不貪方能行捨若內有貪何能行捨者耶論云以無貪者於有有具無著為自性故以對治貪著作善欲成三界有漏果故故云無貪此具前義耳五無嗔云何為無嗔耶答無嗔者謂順我心必貪逆我心者必嗔如我愛財愛妻愛子眷等若奪之者必生于嗔若不貪者奪去必不生嗔故無嗔耳如象婦被獵害不生報念故無嗔逢最苦具四緣不足忍住是無嗔也故論云無嗔者於苦苦具無恚為自性故對治嗔恚不生反修善念精進為自業故或遇惡人奪我衣鉢不生恚念反起慈心是無嗔耳六無癡云何無癡耶答云無癡者觸境事中決定不迷知是虗幻之境本來空故以至二六時中決不迷也故無癡耳論云於事理明解為自性故對治執取迷境反作善事為自業事明解者即俗諦境決不謬故理明事解於真諦理亦不錯也故立無癡名耳七勤精進云何名勤云何名精耶進耶答云勤者晝之夜之而不息也論云於善惡品修斷事中勇悍為自性故對治懈怠滿善為自業故解曰善可修惡可斷也勇悍者不憚勞苦也即是四正勤法中所收謂已斷者令永不生起未斷惡者加功令斷又已修善者保而不失未修善者決定要修是故無勇悍心者決不能進能斷故名為勤為精進耳八輕安云何名輕安耶由前無貪嗔癡等障加于修道勤而精進故得輕而安之所云輕者捨粗重故所云安者得息心達本源故論云以遠離粗重調暢身心堪任為自性故對治惛沉轉依清淨自在為自業故輕安者是初步工夫若進後步者即行捨脫體成工為輕安果耳九不放逸云何名不放逸耶答古德云守口如鉼守意如城云開口動舌無利益於人莫開舉足動步無益於人莫舉舉心動念無益於人莫動故五地云名為堅固者不捨戒行故即名為不放逸論云以前精進無貪無嗔無癡等三根所修所斷念念防護為自性故欲成滿一切世出世間善事為自業故亦精進之別名故名不放逸若細推之即斷我愛之種以至八九十地及如來果地乃精進力可不信乎十行捨云何名行捨耶答於內外財等悉捨不吝乃至眷等亦即捨之又則於冤於親悉皆度脫不計舊過即名曰行捨論云捨者以精進三根令心平等永不生起正直無功用行為自性故對治掉舉令心寂靜住為自業故然捨者有三一捨凡情即貪嗔癡等一切煩惱種故二捨聖見如二乘執著涅槃及七地用加行無相觀智不能脫故今若捨之即捨聖見種故三捨智相故佛證道分中以智相永息故云圓滿菩提歸無所得即名曰捨以捨最後迷性種子脫最後隨眠種子等故是故捨之一字通佛地故十一不害云何為不害耶答不害者如歌利王節節支解尚不生嗔永起慈念為主又如獵師傷象以見染色依人總不生嗔而傷害之故論云於諸有情不為損惱以無嗔心為自性故能對治害心反以悲念有情為自業故以如來三七日中思惟不敢說大乘者恐傷衆生善根故云不害譬如蚊蟲可人有慈種者即手護命指去之故云不害以上十一種善法可有次第否耶答有次第故一由深信力故以前所造之惡決生愧由慚愧心起故凡見五塵物境自然不貪已知貪愛財色名利等故而造諸罪故捨而不貪由不貪物境故有人損我劫奪我物亦不嗔也由不嗔者何也以悟了前境虗幻境空故不癡也由無貪嗔癡故即唯求出世之道勤加精進由精進力故而得身心輕安獲法妙利由得妙利力故恐失聖財身口意三業即念念不放逸耳由不放逸故即念念見三界內無可愛之故時刻行捨以行捨故如歌利王割截身體不生嗔念反起慈救之心故不害也即慈心耳又前十心通三乘修後不害一心轉成大悲通大乘及最上乘如來地耳然小乘中由信力故而生慚愧永不起貪乃至捨心方脫生死大乘中先信力故而頓破無明癡境了境本空故不起貪起嗔乃至行捨永不傷害以見衆生受苦反生慈念而濟之小乘唯自利大乘二利全具成十一心也又無貪即行捨具布施以布施而度貪故慚愧及不放逸者具戒以持戒力而度放逸念念生慚愧心故無嗔及不害者具忍以忍辱力而度嗔心及不害衆生心故勤力即具精進度放逸心故輕安具禪度故以無癡者即般若度以般若妙慧而度癡故又不嗔故而反行慈念不害故起悲也又不嗔生喜行捨即冤親平等故名曰捨是以十一個善心所法廣通三乘四果及諸度萬行等法也乃至三十七品助道之法亦皆通也即思之可知耳中二大八貪嗔癡論云此一句不依文順而解依義順而釋方可次第故一根本煩惱有六二隨煩惱有二十分三一大隨有八二中隨有二三小隨有十共成二十加上六根本為之二十六個煩惱是凡情心所非聖法也八初地菩薩位即斷此心所也今六根本煩惱在五識文中只云三根本即貪嗔癡三煩惱也又三根本即我慢疑惡見三種煩惱在七識章辨三根本者一貪二嗔三癡所云貪者將他人之物率之于已以五塵境及財色名食等俱生貪也故論云於有有具皆生染著以為自性能障無貪行捨生苦以為業也如佛往昔為王由貪財色傷國墮三惡道後作野干如幸智慧力而生兜率院中近聖故貪之一字衆苦之根本也戒之慎之二嗔者若逆之于我即生恚怒於己財物妻妾等眷名利之益被他奪去謀去即生恚怒為之嗔也論云於最苦具增恚為自性也能障無嗔令心不安為自業也華嚴云一念嗔心起八萬障門開閻羅大王為毗沙門天王兵力不如動一嗔心後世為地獄主治汝等人以至每日自招三時銅鑊灌口皆嗔心念也痛哉苦哉切切誡之三癡云何癡耶於諸前境迷于幻境由事理不明以錯謬解之故於諸境中起執取心故為癡也論云於諸理事迷悶為自性也能障無癡淨慧為自業也如提婆達多害佛世王害父作新王新佛豈可得乎故為癡也以上三種煩惱在五根中相應何則由五識緣五塵境順我即貪不順我即嗔事理不明為癡於五識觸五塵境時即引貪嗔種預先成也若落意識比量更添造業今在五識緣現量性境即與貪等相應如未滿周歲童子雖則無知見錢則愛奪去即嗔則可知與五識相應亦與八識我愛種子等四惑相應何則內有賊種外有愛境始相應耳是故雖在五識論之亦係八識種等引之則自然理也以七識情生方托六識成善惡云耳各煩惱種子亦同此例問云何為根本耶答由下小隨中隨大隨三種煩惱皆依此六個根本而起故為根本煩惱如小隨中有忿恨等及諂誑等以忿心所及恨等依嗔根本諂誑等依貪根本無慚無愧及八大隨等依癡等根本餘心所例此可知故曰根本又此貪嗔癡等種子遍法界性盡未來際害法身命故為三毒根耳隨煩惱有二十個心所者總依根本煩惱而得生起名曰隨以隨根本故又分三科一大隨二中隨三小隨云何大隨耶答云大隨者具三義故名大依癡疑為根本故名曰隨次云何三義一者自類起如一不信心所起則懈怠放逸等類漸引起故耳二具遍染性即是不善性及無記性故三遍染心即通內外識染故具此三種即名曰大隨二中隨只有自類起一義云何為自類一義即無慚心起即自然無愧心同類起故故名為中以隨癡根本故即名為中隨三小隨由無三種義故俱名為小以忿等隨嗔本故慳等依貪本故故名為小隨耳又小隨只與第六識及不善性相應不與餘識相應故名曰小以依貪嗔癡三根本故名曰隨中隨二者理應在大隨後因玄祖頌文先論之云一無慚云何名無慚者謂自有過非反以為是而又反輕諸有德人以為他非故名無慚如人逆長反以為能故無慚也論云不顧恥自法為非反以輕拒賢善為他自性故又以龍障聖道慚心增長惡行為自業故名為無慚也二無愧云何名無愧耶答以作惡為非反以己才為勝訴于他人以為其能故名無愧論云不顧世間有德者崇重暴惡以勝最強為自性也又以能障聖道愧心增長惡行為自業故名為無愧問無慚與無愧二心云何分耶答無慚不懼人指背論非無愧反露於人不怖面責是慚與愧則粗細不同故分二也三大隨中有八一掉舉及散亂二法者其相同今掉舉者業性各別如鳥鵲心常好世境為樂總不懇求寂靜故障聖位於在一切三摩地中總無交涉故稱掉舉論云令心於境不寂靜為性能障行捨奢摩他止為業摩他者此方云止故名行捨捨一切見故二惛沉者由上掉舉好動不求寂靜神則疲困故或聞法或坐禪者則惛沉心起故論云令心聖法境上無堪任性故能障輕安毗鉢舍那觀為業毗鉢者此方云觀故名樓觀又云前障止今障觀有此二心所故即障止觀二門永不入道矣實可痛哉悲乎三不信者由前二心所故不得入道如云羅候羅初出家為沙彌好動聞法不解故不信欲還俗也後佛方便引信故得果耳論云於實德處不能忍可樂欲心濁為性又能障淨信以依怠情為業然不信者障道之首謗法之因墮三惡道由此而成也四懈怠者以聖法上心不繫念于三寶中不懇修敬于善知識處有法不聽設聽亦不勤修故為懈怠論云於善惡品修斷事懶惰為性能障精進增染為業於修斷中在善可修不修也於惡可斷不斷也是故精進之念永不入也即貪嗔癡染心自然增長故名懈怠五放逸者如馬無繩如鳥無籠故放而逸之放者不收心也逸者野也以任性而為之也故放逸是破戒之根造業之首領故放逸者障精進之善也論云於染淨品中不能防修縱逸為性障不放逸善增惡損善為業不能防修者謂不能防護身口意三業過非故不能修身口意三業持戒行故名放逸六失念者由前懈怠放逸故所以失于正念而不能入與出世法遠之遠矣論云於所緣境不能明記為性能障正念入道散亂所依為業由不能明記聖道故心散亂矣是名失念七散亂問掉舉與散亂二心何別答掉舉是外境奔馳散亂者內心不寂靜或一時為善念或一時為惡念或信或不信或解或不解或修此不成又別另再修如童子性心無定準故是障道之本耳論云於諸所緣令心流蕩為性能障正定依惡慧為業如人走內道又入外道攪雜邪正之念故名散亂耳八不正知云不正知者如外道等隨于斷常二見或參禪人得少為足隨無相見撥無因果如觀教人落于語言文字而成誑慧或落種種己見執取不捨故名惡見論云於所觀謬解為性能障正知悔犯為業正知者即八正道中之語謂正見故得正思惟由正思惟故得發語正耳是入大道之源也若不正見者墮三惡道之相也五識同依淨色根論云淨色根者簡非浮塵即五根塵又言依根即淨色根簡非依境即五塵境何則以前五塵境上無發識故如勝義根壞時即如眼光失等設若有境識亦不起故唯淨色根有光能發識故又非內五根浮塵亦非外之五塵中境而生識故故淨色者是勝義根最微細故最淨妙故如月之光如華之映印諸像故是以光映之微唯天人見之非浮塵根乃是地水火風四大種所成淨色是細色故難可見也問既五根俱有淨色之光為是同時發識為是遇境緣而生答遇境緣而生識也非同時也何則以單根不發獨境不生以和合故而生識也如人在屋內睡著忽聞雷聲即惺者何也由耳之淨色根中之光應之若非淨色光應何能聞聽聲耶若無聲塵之境即耳識亦不生也由遇聲境緣故方得生識者此矣故眼識九緣生耳識唯從八者在後文中論也問淨色根中生滅即見相二分為是淨色根中同生為識自生耶答是第八識內見分種生相分是第八識四大種所成淨色根光印而生相分若不遇境緣時識等亦不生也即相分亦不現也問是前後起則同時耶答是同時起如牛二角如鏡現像光影同時無前後際故成現量故現即屬相分量即屬見分又問見相二分與種又何差別答種屬藏識若不遇境緣即無種子功能由遇緣三和合故始成見相二分彰露即顯種子功能此二種子者內八識中引業種子性力故外現見相二分是內種子果也又問既相分是淨色根生而淨色根又是四大種成豈非是外生亦非藏識生也答淨色根及四大相分俱屬第八內識中相分況此相分亦是第八識內中引業種生故四大種成淨色根相分如鏡即四大種與鏡光即淨色根不相離故無二體也豈非內乎故云無始時來界一切法等依故界者因也以無始時來一類見相二分種子相續不斷一切法等依者即生五識現量一切見相二分六識現行等法故見種相種是內分中八識生滅引種之所生也故引業種如線見相二分現量現行等如幻若心若色內外等法俱是種子性力之所串也信矣又問如人中五淨色根亦有全具亦有不全若全可知若不全者如人亦有向求無眼光亦有半路而失耳鼻舌等亦復然也是缺不缺者即云阿耶答非無眼也以浮塵四大肉眼根在唯是失淨色根也亦在往昔中過非今生招異熟果眼根中缺一淨色根也故不能發眼識只緣黑境境如善住隨惡道中來生人間在母胎中即無眼也以宿生中罵僧無眼故招此報也餘者例知九緣七八好相鄰論云眼以九緣生耳識唯從八鼻舌身三七後三五三四言九緣生者一境二空三淨色根四明五六識六七識七根本識八作意九種子而生眼識一境是觀所緣緣所緣是境能緣是心二增上緣謂空明根識作意等是增上緣三種子即因緣變四無間緣是九緣中具四緣也而生眼識耳識唯從八種緣者唯除明者即日月燈明也故只八緣而生耳識鼻舌身三識又除空也只七緣耳故眼耳二識離中知鼻等三識合中知後三者即意識七識八識三個識今意識有五緣方生識故一五塵境二根即淨色根三根本識四作意五見分種子除明空等五作意者即心所法有警察之義第六識是比量境乃以帶質方可為境以七識始可以為根也今就古說乃所云耳故依前是七識是三緣生一根本識二作意三見分種子故斯三緣而生七識八識即藏識即四緣生一根即淨色根二境即親疏二相分境三分別四命根種子張名引業種子而生藏識緣好相鄰者眼耳鼻舌身等識有似鄰域即相近釋也餘識不相鄰耳以六識唯審又間斷故七識不間斷有審恆故八識無審有恆故不相鄰是相違釋也亦有鄰者只少分也合三離二觀塵世論云合三者鼻舌身三識合中方知如鼻識離中亦可知也今合者從多分中說離二者即眼耳二識決定以離中方知若合者眼決不見色亦不生識成現量境耳識雖不要明以暗中知者亦要離中乃方知耳塵者即色聲香味觸等五塵也世者即剎那中具三世際也今文順義不順以順義解之愚者難分識與根論云愚者即愚法聲聞教中云小乘以第六識為根為所熏以貪嗔癡等為能熏力大乘以第八藏識為所熏前七轉識為能熏以小乘中不知大乘八識中通如來藏故雖然八識內見分即五識見分是第八識見分種子所生又不知前五識所緣性境相分亦是第八識中淨相分種生雖前五識緣性境成現量見相二分純是第八識中見相二分種子之所生也非餘種之所生也又淨色根光照前五塵性境者是內外無有分別境也又五八二識見分緣性境時最初作意心起成現量時亦無分別問既有一念云何是無分別耶答如鏡照物不留情故即本來智光迷之成無明識悟之即無分別智故六祖云成所作智同圓鏡成所作智者即五識之所轉也而小乘中色與五識俱無分別難以知也問淨色根對境時既無分別是無知耶答既無知者非屬現量亦無分別識化成智即色自空成性決可知耳智性不二成如如性也是無分別現量以無境為境故以上凡情章已竟次頌聖果變相觀空唯後得果中猶自不詮真圓明初發成無漏三類分身息苦輪今論四句中初句云變相觀空唯後得果中猶自不全真論云文順義不順論云觀空始變相耳今云變相在前觀空在後義不順也云所變何相耶答由觀空故而成空相之境耳問為根本智觀耶為是後得智觀耶答若大乘中先悟根本智頓破無明即得二空真如雖得二空真如通達實相亦不住實相見以得無住妙見心故雖見實相而微細修證斷惑之旨故重發最上大乘勇猛之念而究竟重重路境細而察之由此得見道分清修道分清以至證道分清是為後智也若後得智圓即名究竟成一切種一切智智耳若不觀空究竟若體若用若空若假若中一切妙觀而何能成一切智智者哉問云何在五識中用答若頓悟根本智者全在五識明悟本來何以知之如靈源觸見桃華悟道香巖擊竹聞聲而省之者或拈杖痛打頓省三關東坡聽鼠則聲色全消豈非以五識中而悟之也故變相觀空在五識中論所云變相者未省之前俱是聲色之境已省之後盡大地無非淨法界性實無寸絲可掛者也若云溪聲本是出廣長舌山色無非淨法身者尚是門外漢耳直至心境杳無亡言息慮脫體忘懷應諸萬徹方是全體之大用耳即為根本智也今欲斷惑證真者必要後得之智誠謂觀空知有知有觀空所云觀空者窮法性體決定以無性為性無體為體故問云法性本空寂無取亦無見云何無取無見而為性乎答以性空者即是本來佛也斯乃觀真如體中實無纖塵之可立耳所以知有者以雖空而不斷若以不思議戒定慧等無漏種熏即必成一切種智故云觀空知有德耳觀有知空者大經云了達法性者無佛無世界又云如來不出世亦無有涅槃者是觀有知空也又觀空知有由根本智中化出真諦智而照之于空性體中必有妙用故成一切智之者也又觀有知空者以尋常日用之中念念修而實無可修以智體不增故念念斷惑而實無惑可斷者以煩惱自性本自空故念念證而實無可證者以知十地妙行是真如行決無可證也故云如來大仙道微妙難可知非念離諸念求見不可得者豈有證哉如鳥跡履空三際俱無但有其名無足跡也故無證之證者信矣設若空有不立二諦不計似若空畫智無所寄圓滿菩提歸無所得即撒手懸岩者即無可變相亦無觀空見耳是知在凡位先悟根本智後得智始能觀空知有觀有知空而變成自性體也以至圓滿菩提皆是後得智力耳問果中云何而不能全真者何也答所云不全者由如來果中尚用五識即圓成所作之智還用生滅門中以度生也故智相猶不能全真者也何則以應身妙用智相隨機應化是從體起用即修證權智中應若在如來自分中即無權智生滅分身之用故云報化非真佛亦非說法者以平等法界無佛無衆生耳今云不全真者是如來權智妙用之云耳又根本智即實智後得智是權智何則即根本智者無可照也觀也若權智者有可觀也照也雖觀雖照即不住于見耳又實智無照者直指一心故權智有照者成方便故雖用方便即不住也故權即是實何外于權乎乃體用全具耳問實智何以無照答無照者即無智也又問既若無智是誰知法體本耳答以智即無智故智體本自空也智體本空則實際亦無所得也無所得者是如來淨法身耳故應照是權無照是實非以權外而有實智非實智外而有權智之可用也信矣圓明初發成無漏三類分身息苦輪論云問五識尚未語完八識全然未解云何而言圓明無漏之果耶答雖在五識論之乃通八識無漏之果故在五根識中見色聞聲豁然頓悟果中之旨若能轉五識成智者即是果地之言今以次第分義亦云果中圓明妙智之德耳梵語涅槃此云圓明圓者無缺無餘是不增不減之性也所云明者即權實二智圓滿無二智也即後得而成實智以應機即權不應即實然則在權非權在實非實故權實不二自在者二乘莫測豈可思議乎云初發無漏正是無明種子永別故成無漏是以應化三乘五乘乃至無量諸乘化身非凡情及二乘小果之所測也故云以息無量衆生之苦輪耳此識即根本無明之惑也謂本覺心源初無動相續通括五識現量見分不生即八識見分決不生也何則以八識內見分種者由托五識見分種各緣五塵性境生似現量始起是故外緣境不生即八識內見分決不生也況五識見分種即八識見分種無二種者也問然者只有五識見分種決無八識見分種答八識見分種者以八識種性內本來具足五識見分種自性若不遇五塵來會故五識見分種性決不生耳似如金鐘本有聲性之德因遇外緣手擊始顯聲性之音耳若不遇緣手繫聲性決不顯也信矣是故八識性中本具五識見分種亦爾由遇五塵性境來迎即八識種性應生五識見分種性也故八識見分種性即五識見分種性決無異也是一見分種無二性也問又何名五識見分是八識見分種生耶答前不云乎見分生者是種子果也由果故顯因耳云何又名種耶答由八識見分種性能分五識見分各緣各境如眼識雖見色是九緣生者只緣色塵不緣聲塵餘境又如耳識八緣所生者只緣聲塵不緣餘色塵境鼻舌身等所緣各境亦復然也以各別所緣塵境不同之性故喻種也如秈糯稻種其性各別緣五塵見各性似如種耳又五塵不會因種決不生也若緣一會即五八二識見分種果相頓即顯也故又名因緣變因種而變聲色等境即因種見分成現量也又問云何五識見分各種是八識見分一種生耶又八識種從何種生耶答由引業種而結成今生現在八識五識種也果也問引業種子又依何生答從自空性中生亦從空性中變譬如幻師以呪力故而呪成種種六根六塵六識八識種相果也此亦如是以引業力故引生異熟果也故云無心化出有心形業性原從空性分此是黎耶識性悟之者即真如性也迷之者輪轉生死可不信乎問業性種子因何而在空中生耶又若無因云何能生業性果耶答由無始以來以無明迷性種子熏在空性中故觸境迷于聲色幻境起憎起愛即內取諸心外取塵境托於第六意識造于有漏善惡二業以七識中念念收藏在第八識中而作當來引業種果成黎耶識也是為不思識熏成黎耶果識者為之不思變也是故于空中化出種種業性果報輪回如水成波之幻泡者即斯義也是故智者了生滅門果報即本來空性是不生滅門也信矣以上論五識轉智文竟問五識已知未知六識之相是云何耶答六識者名事識以分別前五塵影子落于意識思量分別見中變成五塵境影名分別變以六識見分變而成境非真有境是法塵者以半分屬見分心以半分屬外塵境雖是外塵是六識見分之所生也故六識為事識以分別五塵事故又名意識者以思量為意又意即識也是持業釋耳在頌中前八句後四句即成妙觀察智普見三乘五性之機而說法故問佛果位中而云妙觀察者豈非還同識性無二者耶答雖云妙觀察者如鏡鑑機不留情故亦即成所作智中流出之義以衆生分中似有妙觀察者如來分中實無此智云耳亦同成所作智俱屬權智耳若權智之應即實智用也成大圓智故因玄祖次頌六識章十二句云第二六識頌中又分為二前八句凡情章後四句無漏章初頌凡情三性三量通三境三界輪時易可知相應心所五十一善惡臨時別配之性界受三恆轉易根隨信等總相連動身發語獨為最引滿能招業力牽今論八句中初句云三性三量通三境論曰云何名三性而又通三境耶答三境者初性境是實五塵性體為境是第八識親疏相分故二似帶質境以心心所法即第六識見分為自體即五塵影以為境故也三真帶質境以第七識見分執第八識內見分為體即七八二識見分合生成影以為境相分不起名言無籌度心初名性境云何名似帶質境答所云似帶質境由五識及同時意識緣前性境成現量時一剎那落於比量意識中如鏡照像成影為境名似帶質境雖然似帶質境又有二義一有質境二無質境云有質境者如前所云之義云無質者如緣空華水月及過去未來之境并龜毛兔角非量等名無質境又真帶質者亦名無質境以無外塵影境故三真帶質境亦有二義一者若自心緣善等十一心或惡等二十六心又或五遍行五別境及四不定心者名真帶質境或緣他人善惡等心即名似帶質境也非真帶質耳二者若七識在定中緣第八識內見分者名真帶質境所云境者以七八二識見分合生成境耳故云以心緣色似帶質中問相分一頭生又云以心緣心真帶質中間相分兩頭生即可知之耳以斯真似二質總名為獨影境何則以前五識不用事故唯第六第七用事若六識用事無五識亦無七八二識伴侶故名獨影境也又七識見分唯緣第八識內見分時無六識伴故亦為獨影境耳問既有八識相伴云何名獨影答以是第八內見分而轉出七識見分即七八二識見分是一種所生總一見分成影故名獨影境也又問若七識緣八識在何分所收答是四禪定境所收攝也今論有質無質名獨頭意者何也有四義故一散位二夢中三亂意四定中俱名獨頭者亦無餘識故均在六識七識若在業力種現在八識中收後文中辨問云何名散位獨頭者以吾人心似猿猴在室內緣五方窗眼即東馳要奔無暫停歇故名散位問三量中通何量耶答三量俱通何則由五識緣五塵性境成現量剎那流八意地方成比量若錯緣塵境如鐘聲甚作鼓聲境者是非量也以凡夫遇善成善遇惡成惡等故名散位耳問以何為體答以心心所為體云夢中獨頭者由數常日用中所緣善惡無記等境自熏成種在夢迷性中唯第八識見分種生是虗妄迷性非現比二量五塵境生純非量境是假名見分體也是八識中熏習力強生也莊子云昔日莊周夢為蝴蝶直至惺來為是莊周為是蝴蝶云此之為物化憨山老人云此老未知三界唯心萬法唯識不知吾人有熏習種而成夢境若日中未見蝴蝶如何夢中而見故佛說一切法從因緣種生非自然生也然夢中等境是虗因虗果故種子及夢境果俱非實也故夢造善造惡非異熟報攝也復次夢中境者或過去力強而現夢境或夢善境助生善或夢惡境助生惡現在持誦此大乘經典因深信力精進力于夢中必成大善等境如法華中夢成佛道等非三量中收惡夢等境亦復然也然更有亡人討濟如郗氏等類此乃自他因緣業感之所成也亦非三量中收現量比量之言數皆不相違定可信受耳云何名亂意獨頭答亂意獨頭又二義一真亂意二是非亂意真亂意者因瘋狂及患以青作黃故五識不能緣塵唯第六意識力強無主宰故如寺中主人迷亂混責衆人故名亂意獨頭耳二非亂意有似亂意如現在將死未死以善業力強即見天宮樓閣或遊西方聖境非亂意也若是現在人未死偶見役卒摳杖或見閻王拷而罰之如藥師及地藏經示是業力也前亂意者非量所收後是異熟識善惡種力非三量收也又問如人參禪中見佛及西方聖境可是善境否答云非也是魔境亂意故或過勇力眼中火出神色不定口內作偈似正不正俱屬魔境皆為亂意問云何見佛聖境名為亂意耶答夫參禪者以一切凡情聖見俱要掃盡不立纖塵誡謂實際理中纖塵不立佛魔並遣見法實際尚要吃棒況存聖境是亂意非量中收若是持誦法華華嚴等經現在中見多佛或見彌陀及觀音勢至或光華祥瑞等相由念佛力故俱與西方果熟有分非亂意也是現比二量聖境所收無非量者耳何則前參禪者是修無生因故要頓空目前之境內外寸絲不掛方是無生或念佛誦經禮懺修萬行因是熏習種故見聖境是熏習果非魔境耳若是執著我見名利及愛種不斷者決是魔也外道法者即是此耳問云何名定中獨頭耶答云定中不繫外境唯七八二識為主名定中獨頭者斯有二義一者邪見二者正見邪見又二一也空外道修無想定滅却心意識處以至悲想四如天等若我見種不亡者即名邪定何故夫一切聖人皆證無我方成佛道故凡有絲毫我者即是凡夫頓斷我見種絶即是聖人況有愛乎二者如是人為生死故或為最上大乘心故或參禪者古人以方便故教人看一念未生前句等用心懇切以至山窮水盡忽然頓省初關未得二關三關者以為自足即將古人言句串集成篇語句盡是比量心意識邊事久久言句盡成非量見耳羅漢得初關者如云無少法得者是羅漢偏真見果先已斷盡我見愛種始證羅漢位也今之人者我愛名利俱未去盡一毫云何而得超佛越祖果耳錯之大矣久久我慢心起是是非非慊謗正法為魔伴侶及于習教持律我愛不斷者非正定也是故參禪習教持律者總要頓斷我見愛種者方入聖道之果也切不可得少為足誡之誡之問云何得入正見耶答悟後專念習唯心旨達色本自空寂心境杳無無少法見非但超越外道亦得頓超羅漢偏真果見何故以了一切法者決定無一切法也內外杳無永斷疑惑凡見一切法者即是見心也心尚不立況有境乎故經云無智亦無得者始見如來淨法身也以得離垢眼故可不信哉又云正定又二一者如前心修四禪四空定等依佛破我愛見入九次第定先入四禪定中通比量見是定中獨頭又九次第定滅盡心意識處忽然頓悟偏真無少法得而不斷滅者即小乘中定是生空也二者如前云心境杳無得唯心旨無少法得者即悟色本自空離相即佛肇法師云真空無名真色無形方是大乘二空真如也乃至如來果地亦復然也何則前是七地入八地修道分圓果耳今如來者證道分中之果亦無少法可得何則八華藏界離諸見故八三際海無剎那故問以何為體答以無分別現量為體華嚴出現品云如來境者以無境為境故是如來境也信矣又問前修道未圓通比量觀寄名定中獨頭見實相故次修道分圓智境杳無頓證無生人忘牛寂觸境圓成沒大千者是寄名現量境也答如來果地入三際境無剎那者是真現量也至矣以上四種獨頭論釋也問云三性三量通三境耶答三境三量前已論過今云通者如人隔墻打鳥偶聽鎗聲即率爾心起成善成惡等境由初聽聲即性境成現量落於意地即似帶質境是比量錯聽境者是非量然真帶質境不通現量通比量非量故如人向日有善惡種者即觸境現量比量等三境俱成善性境若向日好殺生者聞鎗聲性境現量比量等即成惡性境也以上初句已竟三界輪時易可知論曰云欲界色界無色界由善惡種子成引業滿業之因故成輪回六道苦樂之果也故頌云易可知也相應心所五十一論曰於善惡等共有五十一心所法者於八個識中各與何識相應耶答如五遍行心所應八個識故云遍一切心又五別境心所亦在六識若慧心所依外道見通七識故若八大隨通七識相應中隨及貪嗔癡等與五識相應見疑慢惡見三心所與七識相應通外道天故又忿等十心及四不定心俱六識相應共成五十一心所法也即除去三十七心所還有十四個心所在六識中收者即今一一論之今初先論十心所有五個隨貪根本有五個隨嗔根本耳論曰五個小隨屬貪癡者一諂二誑三覆四驕五慳云何名諂謂外實內虗假莊聲勢令人可敬扇誘衆心令人供奉引利獲已故名為諂論云為罔他故施設異儀以曲為性障正直心為業屬貪分中收云何名誑謂外現有德習修聖位有似出言誠實引人信伏種種供養故名為誑論云為求利譽現有己德欺詐為性障誠實正念為業屬貪分中收云何名覆謂以自有過恐他人知失於利名故藏己失屢不懺悔故名為覆論云於自作罪不令人知恐失名利故隱藏己非為性能障不覆懺過為業屬貪分兼于癡云何名憍謂以自縱心各事順我為樂倘有不順我意動口罵詈淫殺盜妄由此而增故名為憍論云於自盛事深生樂著醉傲順己為性增長一切雜染等為業屬貪分中收兼與癡共云何名慳謂於己財如割身肉乃至父母師長眷等尚不能捨況外求耶故名為慳論云耽著己財不能惠施為性障止行捨為業屬貪分中收云何名忿內有財勢或自力強欺壓可損小不順意即刻面叱如火爆流故名為忿論云依對現境不順己事憤發為性障慈恩不報為業屬嗔分中收云何名恨謂他有勢及有財力竟不能報或孤寡貧賤等苦受人欺壓懷惱已久故名曰恨論云因他忿欺受冤難解為性障不惱捨念為業屬嗔分中收云何名惱謂以諸所求不遂所借債率之不還或父子兄眷等冤會不離故名為惱論云觸境不饒益事暴戾為性障止能忍息諍為業屬嗔分中收云何名害謂以無慈念心顧己為事由為他奪利奪名故暗損他傷他父子及于眷等破他家産或用官勢因事損他故名曰害論曰於諸有情無悲愍心損他為性障止不害為業屬嗔分中收云何名嫉謂以見他獲利名譽過勝不來敬奉于我故名曰嫉論云見彼有勝失我名利生惱為性障止不惱不妒為業屬嗔分中收亦兼屬貪分中耳以上十心俱屬貪嗔亦兼癡分中收此之三根本及十心所者名不善性在六識中業最為強也三界內惡道因果皆此力成可不痛哉次論四不定心所者一尋二伺三睡四悔由或成善或變成惡故名不定心也云何名尋云尋者或觸五塵境中落于意識中尋善尋惡等未定以想心未準故名不定云何名伺云伺者由前尋想之境未定復又推之故用思力或成善成惡不成思心故名不定故書云再思可矣始為定也云何名睡謂以欲善誦經坐禪等事倘遇神疲故先養息方可為善或遇善境懈怠不隨衆善即名為惡由善惡二境不定故名不定心耳云何名悔於先作善事或遇惡友謗善成悔或先造惡遇善友訶責成悔故名不定心耳然尋伺二心所通六識亦兼通五識及七識不通第八識故言以上十四個心所屬意識收者論釋已竟善惡臨時別配之問善及惡心所云何臨時而配答所云配者由無始所熏善種惡種以七識收藏在黎耶識中故今生觸善境而生善現行觸惡境而生惡現行若生前未熏善惡種者即今生遇善不生善遇惡不生惡名無記性也故云善惡臨境時以各別而配之也信矣又復次熏者有二義一者舊熏種即前論義二者新熏種又二義一是新熏增長種現二是以作當來種現云新熏增長種現者如人未飲酒味而不願多飲故種子力而未深也以至彼人勸之多飲故熏習力大每日不離飲酒心念現行斯為種子力大而熏增長飲酒現行非別種也而飲酒現行復熏種子故令種子增長永世難斷如飲酒熏習增長種子及現行者而一切煩惱愛財愛色等現行種子纍世增長不斷誠可痛哉也悲夫若非如來大慈悲力說此二十六個煩惱現行種子種種輪回痛苦豈能知其過患也哉如是故諸修道行人必須要念念修戒定慧及三十七品助道法等及諸六波羅蜜等始能脫苦者也噫若不尋常熏習戒定慧等行成種力強至臨命終時將何抵哉所以云生死關前半字難相救耳總有孝順子孫亦不能替得者性界受三恆轉易論曰性是善惡無記三性界是欲界色界無色界故受是苦受樂受及不苦不樂受又初來領受去捨受或云三受或云五受耳恆轉易者以善種引之而往人天善道以惡種引之而墮三塗故云恆轉易也根隨信等總相連論曰即根本煩惱隨即隨煩惱共二十六個煩惱心所及十一個善心所以至五遍行五別境四不定等內外總相連也前五十一個心所各配八個識相應論者俱從多分中說其各心所者兼與內外連應動身發語獨為最論曰問云三業動者云何以思業而為最耶答動身以心思故而能動也發語以心思故而始發也故今云最強者非身口強也是思業意識獨為強也最也然思有二義一審應思心未定也二決定思心決定也無改易故也是故造善造惡乃至出世修道證果皆以思業而成之也是故第六意識最為強者則可知矣引滿能招業力牽論曰前所造身業口業意業之善未知成何果耶答招引業果又招滿業果問云何名招引業果耶答由宿生所造善惡二業現行以七識收藏第八識中成引業種而引至現在招苦樂二報之果若無善惡即無果耳故引業者因通善惡果唯無記善惡之先發華無記者是異熟華以異熟果不會造業故又云滿業果或生前好殺生雖在人道招引業異熟果而短命及多病報不順六識願若生前好放生修慈念者在人道中而得長命及不病招身強力報以順滿第六識願也故為之滿業果耳故乃餘善餘惡等可知世間之力大者莫過于引業種子以牽之于天道人道修羅道地獄道餓鬼道畜生道或牽至往四禪四空處天若四禪四空天報盡而引業又牽至于人道倘造惡業成引而引種又引至三惡道中報故八識如罪人引業如差役六道如各縣處是故引業差役最為強也何則八識依引業種差役而各處成就報也是故引業最為力勇耳又如人修戒定慧等或兼修無生忍因或念佛求生淨土斯為淨業力強而七識收藏在八識中成就不思議淨業力頓空五蘊之相又能速至西方淨土得證無生忍果者亦斯引業種力也非世間引業種是出世修擇滅無為力也亦名引種耳一章已竟次頌無漏發起初心歡喜地俱生猶自現纏眠遠行地後純無漏觀察圓明照大千今論四句中初句云發起初心歡喜地俱生猶自現纏眠論曰既在凡情位中云何而八聖位耶答以宿生中遇最上大乘知識而熏成最上圓頓之旨力強成種今又重熏圓頓之教誠謂一悟即一切悟也是故我見分別種子一斷即一切斷也可不信乎是故八初地時超凡夫地入菩薩位生如來家耳亦但現行煩惱可斷即微細俱生種子最難斷也故云八果聖地猶是有現纏眠耳是故初地至六地中方斷盡潤生煩惱現行及于凡情種子以七地入八地中方斷聖見種子下偈文可知耳遠行地後純無漏觀察圓明照大千論曰遠行者遠離三界近法王寶所地也是故前七地中寄三乘行位法華經中三乘人同出火宅遊過三百由旬至八地九地十地乃至佛寶所城也乘大白牛車耳故成無漏者成證道分中無漏果也是故能觀察圓明照大千法界云耳所觀察之智如鏡照物不留情故同圓鏡智性則可知也前已釋耳此以上釋無漏四句一章止結上前凡情及無漏合一大章論釋已竟問六識已明今七識妙義是何作用耶答七識作用者以緣第八藏識為自分作用又與八大隨及遍行別境中慧并我癡我慢我見我愛四惑相應者下文中辨論問以何名末那答此方云染污又名染淨識又名分別識染污者念念與八識四惑相應故名染污識又六識念念成有漏染即七識念念成有漏染六識念念成無漏淨七識念念成無漏淨故名為染淨識又念念分別有為是幻無為是空二見不脫者即名分別識若二見脫者即平等性智成大圓智故又名傳送識如人自力不足內外打雜忙故名傳送識因玄祖在七識中亦頌十二句因第三七識頌中又分為二前八句凡情章後四句聖果章初頌凡情帶質有覆通情本隨緣執我量為非八大遍行別境慧貪癡我見慢相隨恆審思量我相隨有情日夜鎮昏迷四惑八大相應起六轉呼為染淨依今論八句中初句云帶質有覆通情本論曰帶質者以七識見分而緣八識內見分故帶起內外見合生成影為境是假名質也純是七八見分共種所生非外五塵性境所生故名帶質境以見分心心所為體故云有覆者有二一有覆性二無覆性以二覆俱名無記性者七識執第八識為我名有覆無記以七識不執第八識為我名無覆無記前在第四禪天及空無邊處天乃名有覆若在四空頂天名無覆無記以滅七識種故無帶質境也問既滅七識不計我云何非聖位耶答由無明熏習我種雖不現者以定力故我種不現也非破無明迷性若破迷性定與不定一切幻境皆自空也故永不計我始成淨妙智耳八無生也故此無記無明殼也又問有覆云何不成善惡性耶答以七識不馳外緣故不能成善成惡種故名無記通情本者以七識念念攀緣第八見分有情為境故名通八識情本也非八識有情而攀七識為情也隨緣執我量為非論曰云何七識執第八見分而成非量耶答李長者云情生智隔即七識情迷本性智成無明殼也相變體殊即五識見分原是八識見分本不留情由七識中即剎那生情六識分別成似帶質相變故成非量境耳何則由目前相者本來自空無寸絲可得今云有相即成非量境也問前云現比二量不錯即無非量境也今依現比二量不謬之境云何成非量耶答緣前境錯是非量中又成非量今依實際本性云前有相是無明迷性非量也又問若七識執八識見分為非量者而外觸境生迷亦為之非量豈非內外俱成非量者乎答論云一圓成實性二依他起性三遍計性圓成性是真空義依他起性是不空義遍計性是虗妄義又真空者是不生滅門也不空義者是生滅門由迷生滅與不生滅義故成遍計虗妄性也在轉識成阿黎耶見相二分又八識見分即五識見分緣五塵性境相分觸境生迷妄計根塵器界以為實有者故遍計性即非量也是因玄祖頌中云執之一字即統內外八識之計成非量境也故吾人要知尋常日用之事盡成非量者也如若夢幻耳八大遍行別境慧論曰云何八大隨煩惱與七識相應又與五遍行及慧相應耶答由七識託六識外馳故成掉舉由六識迷悶間斷七識不斷緣內故有昏沉相應由七識無堪任性故有不信懈怠放逸散亂失念不正知耳是故大八隨者共與七識相應故凡夫外道小乘均有此耳故法華中迦葉等云我時在座身體疲懈但念空無相無作不信大乘有佛可成即近八大隨數非煩惱也又遍行相應者由七識託六識外境即遍行與五識相應亦與七識八識念念相應若六識不緣外境今七識無處計託總緣八識之境即五遍心所念念與七識相應問既與八識相應云何與七識相應耶答七識見分即八識見分是同種生故八識五遍行即七識五心所共也又別境慧相應者由外道遊無想定以至四空天處即七識緣八識時乃與邪慧相應耳若破無明我見即與正慧相應也貪癡我見慢相隨論曰此七識四惑云何是八識四惑同種生耶答第八識中有我癡我慢我見我愛四惑相應者由七識執故方成四惑何則由遍計性執內外境實有故名我癡癡者迷也由迷性種子藏于八識中以令七識執我成慢由我慢故成見由成見故觸境生愛由愛故造諸各業是故總以我見癡迷自性而以七識執八識見分與四惑念念相應者耳今頌文中云貪字者即愛字也由平仄韻不合故用貪字耳此即頌七識四惑相隨八識云耳恆審思量我相隨論曰恆審者有四科簡一者恆而非審如第八識無審察故二者審而非恆如第六識雖有審察非恆常遇無心位有簡斷故三非審非恆如前五識緣現量境即無分別故云非審剎那流于意地中故云非恆四者今七識中亦審亦恆以內外俱有審察念念恆而不斷故云亦審亦恆今頌云恆審思量我相隨以執八識為我故云相隨有情日夜鎮昏迷論曰即色無色天等有情以日夜中念念昏迷自性而執于我以至如來金剛道後方脫此苦果耳四惑八大相應起論曰今云迷四種者前頌中分開四惑今合云四惑者由內有惑種生迷外即觸境生迷成見成愛乃至八大內外相應而起故不單指七識與大八相應云耳設若迷性種一脫則內外頓空幻相見法身耳六轉呼為染淨依論曰云何以六識作七識為染為淨者耶答由六識上記前五塵性境起好惡憎愛等心或見愛善境修善見不善性憎惡念念要捨以六識成淨斷惑帶令第七識亦成淨斷惑而熏在八識中收而藏之以成引業種子必至當來成無漏出世果耳設若好惡性等境者即不善心也念念要造以六識成染增現行業帶令第七識亦成染性熏習八識中收而藏之亦成引業種引至當來受諸苦果耳問七識依六識成染淨者何也答以七識無力所造故總要依六識力而造成也如母無力要依子力而成之也即以上論凡情八句頌已竟次頌聖果極喜初心平等性無功用行我恆摧如來現起他受用十地菩薩所被機今論四句中初句云極喜初心平等性論曰前五識六識章中總依初心為歡喜地今又依初心歡喜地者何也答玄祖之意先各識八句頌凡情章窮盡生滅門意始可頓露三界唯心而成夫唯心者即真如門也故前生滅門者以知萬法唯識見也後唯心者無少法得也若直示一心當下了然者即入初地位也以至七地入八地乃用八種無生妙見直入如來妙果地耳無功用行我恆摧論曰無功用者是何地得耶云何而不云摧法而言我恆摧耶答夫無功用者在七地中念念無相觀智未亡今至八地中頓脫無相觀智永不生起但智相雖脫即無生法忍見未捨故雖我種脫盡法執猶存少許若頓捨無生入法界海普印分身自在無礙即我法二執盡皆脫矣始得法恆摧也故此文中只云我恆摧也如來現起他受用十地菩薩所被機論曰云何如來現起他受用而不云自受用耶答如來本有自受用樂由為十地菩薩機故而現起他受用身也又問為是現丈六金身為他受用乃至為現微塵相海之身為受用耶答如來非以相為體但是無相寂滅法身相威儀具足世間隨樂皆得見是故或現大滿虗空中或復現小百億化身或微塵相海或現無盡身雲此他受用者豈可思議者乎若自受用身者唯一真淨法界耳此以上釋無漏果章以結上凡情及無漏果一大章已竟問七識已明未知八識幽微即云何知之耶答梵語阿黎耶此方云含藏識也以能含藏諸法及種子故諸法者即根塵器界又能含藏善惡無記現行及種子故是有財釋耳又名無沒識以六道輪回中不能沒故因玄祖在八識中又頌十二句云第四八識頌中又分為二前八句凡情章後四句聖果章初頌凡情性唯無覆五遍行界地隨他業力生二乘不了因迷執由此能興論主諍浩浩三藏不可窮淵深七浪境為風受熏持種根身器去後來先作主公今論八句中初句云性唯無覆五遍行論曰性即三性中無記性以不與前七識中煩惱俱故又平等中無違拒故以因通善惡果唯無記故又八識內見分無分別故故內識見分即五識外見分故所以五識緣性境時成現量無分別境者此也又第八識只能含藏不能執藏故前七識念念熏為能熏八識念念受熏為所熏故七識善惡無記三性種而能收藏八識中作引業種子也有無覆性者前已論過云五遍行者總與念念八識相應以至四空天處尚與五心所相應或現或不現如云非想非非想也此矣界地隨他業力生論曰界即三界地即九地因八識中引業種子力而引至于欲界中五趣雜居地又引至四禪四空天處故第八識被善惡引業種子引至于三界九地各處生者總是種子力也二乘不了因迷執由此能興論主諍論曰云何二乘不了有第八識生迷執耶答由聲聞等人只知有六識為染淨根本依以染者有貪嗔癡故以淨者有戒定慧故三界為苦諦之境以貪嗔癡等為之集諦以戒定慧等為之道諦以出世涅槃無為性為之滅諦以推求苦果因是何處來由貪嗔癡等集諦而成苦果以涅槃樂果又從何而來因修戒定慧等道諦之因方成涅槃出世之果耳雖然此成染總依六識而為根本故今大乘中云第八識通如來藏者則不信也故云由此小乘見淺共與大乘諍論者也浩浩三藏不可窮論曰浩浩者深義也三藏者謂能藏所藏執藏也初能藏者以能持義邊論以能持藏一切諸法現行所熏諸種子故二所藏者以受熏義邊名所藏以受前六識所造善惡現行等種以七識收藏八識中成引業種以受前七轉識熏故三執藏者以執持義邊即七識執第八識內見分為我故成我癡乃至我愛等四惑具相應耳故又現行如母而生種子故為能熏八識為所熏耳若種子生現行者即種子為現行母故而現行又為子也互相熏習念念增長不斷故大經云無邊引起相故種子者為之隨眠無明也以隨順真如性中眠伏藏識又為之不思議熏成當來引果種子果者即為之不思議變也復次隨眠無明者有三一潤生無明即我愛種在八識中收是初地至六地及二乘在六地中斷盡永不生也矣二法執無明即六地進七地入八地中及二乘同捨我法二執之障同捨無生法障之見入法界海如月印萬川分身無量度衆生故耳三最後無明以八地九地十地之所斷也即業轉現也業為種子轉為見分現為相分不在分段異熟果中斷也何故以七地八地即世間有漏異熟分段生死果久已斷也今所斷者云八地斷現相則永捨相分九地斷轉相即永捨見分十地斷業相即永捨無明種子更有最後微細種子在佛地中斷是捨出世無漏智果相即是出世變易生死果也亦名異熟果故云金剛道後即異熟果空乃是捨二死果也又問如來果中為是有黎耶識性異熟果耶為是無異熟果耶答云無異熟果問云何諸大乘經云如來往昔修無量難行苦行今得如來十力四無畏等之果豈非受異熟果也答豈不見經云吾今此身即常住法身耳又云我性未曾有我所亦空寂云何諸如來而得有其身實無異熟果唯法身性耳又云圓滿菩提歸無所得者此矣淵深七浪境為風論曰八識淵深者以八識任持諸心及各境而無息也所以為之淵深似如大海湛湛常靜由被無明五塵境風激起七識之波成六識之浪念念不斷善惡現行及于種子故輪回三界永不絶也實可痛哉是故經云藏識海常住境界風所動種種諸識浪騰躍而出生又云譬如巨海浪無有若干相諸識心如是異一不可得云前偈是被無明五塵境風而轉故有六七二識浪起後偈頓破無明境風及于現行種子之相故云無有若干相異一不可得唯如來淨法身耳受熏持種根身器論曰受熏持種者由宿生受前七識善惡現行種子而成八識引業種子引至現在未來而成根身即八識中親相分器界即八識中疏相分以內外親疏相分總被第八黎耶藏識種之所持也種者即宿生引業種也亦是吾人現在命根種子持令不散或遇境緣悶絶氣息若引業命根種子不絶持三日或五日以至七日等即四大身皆不散也故引業種有如許之力者信矣去後來先作主翁論曰八識先來云何相耶後去又云何相耶答先來者由宿生引業種子引黎耶識種來以吸父精母血及己靈引種三和合相而成胞胎以七七四十九日後成六根之體又胞胎內心肝脾肺膽乃至毛髮爪齒等及心意識者無不件件分清以至老死之相若苦若樂之果毫不漏也是為來相耳云何為去相以八個識先去眼耳鼻舌身及六七二識黎耶識體將似木石之相周身俱冷唯引業種子以至生六道各處地界即必知也云何知耶論曰頂聖眼生天人心餓鬼腹傍生膝蓋離地獄足板出是去之相也頂聖者周身俱冷唯頂上最暖或生天者以周身俱冷唯面門眼暖也乃至地獄足板出者即引業引至地獄道去也周身俱冷唯足板暖耳問若黎耶識異熟報身要捨者宛同心外有法耶非唯心耳答起信論云有四種空鏡與虗空等一者空鏡二者不空鏡三者熏習鏡四者法出離鏡耳云何名空鏡一切生滅染法不相應故云何名不空鏡一切法等在空鏡中不出不入常住一性故云何名熏習鏡以修一切戒定慧等無量善法而熏習成一切種智一切智智故云何名法出離鏡以一切煩惱障及所知障俱斷盡故乃至隨眠種子俱脫盡故故今凡情中在八識中亦具四義鏡故一空鏡一切先來後去異熟果影與空性鏡中不相應故何故以一切異熟果相是虗幻影似如空鏡影與空鏡性體不相應故二是雖有異熟相影在不空鏡性中不出不入故是故來也無增去也無減如空鏡影無來去故三熏習鏡以後無漏章中若非熏習無漏不思議淨業成種焉成如來淨妙果故四法出離鏡者如八句凡情有漏章中若不窮盡萬法唯識生滅門者而唯心之旨亦不露也故云法出離性鏡是故四鏡圓成性相雙融唯心妙義故心外決無一切法也凡見一切法者即見心耳豈有異熟去來之相者乎故云作主翁者即善惡引種力而為主翁者也若有漏引果盡者即三界無可繫縛耳以上論八句有漏章已竟次頌聖中聖果章不動地前才捨藏金剛道後異熟空大圓無垢同時發普照十方塵剎中今論四句中初句云不動地前才捨藏金剛道後異熟空論曰云何不動中才捨藏以金剛道後始得異熟果空耶答論曰從有漏因至無漏果者略有三位一我愛執藏位即屬潤生煩惱也二善惡業果位即引業以成發業種是俱生五蘊遷變分段生死也三相續執持位即引業種果也又論云若斷潤生我愛煩惱始超四地至入六地方圓脫盡八識中潤生愛種及四惑種一齊斷也又破和合七轉識性得三解脫門二善惡業果位者斷分段生死果如初地中先斷異生障永不受四惡趣異生果也二地已去至入八地中頓脫三界分段生死業果捨三界內最後身業果如云盡此一報身同生極樂國者此矣三相續執持位斷引業種者如前斷分段生死也奈出世即淨業智力受變易身亦不斷也雖通法身還受智身有似生滅智相猶未盡也故名受變易身是不思議淨業之所感也非是欲界色界善業果也今若至如來果地即變易身智始脫盡耳金剛道圓之後無少法得決斷變易異熟果空也非三界內異熟果空耳故云二死永亡置三德岸者此矣大圓無垢同時發普照十方塵剎中論曰大圓者即圓成實性也以呼之即應即名智也是故此智窮三世而無剎那之際遍十方之華藏竟無寸絲可立以綿綿若存用之不勤是圓成實性中本智也永捨生滅相故如鏡照影不留情故若應于外即名成所作智妙觀察智是權智也或應或不應永無增減名平等性智周遍法界盡未來際本同空性毫無智相名大圓智由照用自在故喻鏡智非實有智相可得也故云無智亦無得者得離垢眼普鑑十方塵塵剎剎之中以無盡身雲如月印萬川者盡未來際故故云同時發也非去來故最寂靜故若阿字種非名言故非智見故非內外故非大小故非一多故故在用即為智身在體性即為法身又智本是法法本是智非一非二非異非同但有言說俱成戲論故普賢菩薩讚佛偈云如來清淨妙法身一切三界無倫匹以出世間言語道其性非有非無故是故剎塵心念數者皆不能度也方是如來淨法界身耳八識總論破迷成智性後跋吾聞之曰夫幻身者即法身也今云幻身者即黎耶識中所持親相分也所問曰因何而成之也答曰由宿生中引業種子力故而牽引宿生善惡種以至今生乃成四大異熟果之幻身也原夫幻身者有似幻師以呪力故而呪成六根六塵六識之幻身也若宿生引業呪息則幻身業相脫然息矣然則幻身雖滅者唯性智不滅也何則以本來智性中一切幻相去來不相應故雖今現有其相而幻相業體本自空也何必要除其幻相而顯法身空性之體也哉涅槃經云吾今此身即常住法身故來如水月去如幻息來亦不增去亦不減同真際等法性內外無寸絲者豈有幻軀之相之可得者哉或問之曰若衆生自性本自常住云何而又迷之者乎答曰大哉問乎子所問者衆生智性云何而迷之者耶豈不聞聖人云三界唯心萬法唯識唯心者即真如心也故馬鳴起信論云凡所見一切法者即是見心也是故心外即無一切法也以唯心故以一切法界本來常住無遷變故又因何而有一切法耶答唯識心之所見也是故當知由本性智迷成識由識迷于性由性成色由色生于染由染成于妄由妄成于取又妄為能取色為所取如醉夫之迷心以無法中而成一切法也以無心中而成一切心也以無法者本性也以無心者本智也又本智者寂照也是吾人本性不動智也則是故衆生於現在中不迷智性者即識成智即色成性以色身者即法身也是故觸境明如無聲色故凡見一切法者即唯心故以真如心之所現故雖見而非見故是故五識者法身性中智也既自法身性中智光如鏡之照即應而不應也如不應即成圓性中智若應之無心即五識成作智也又寂智者實智也成所作智者即權智也故權智應于外實智冥于性又權智者即暫時而應故名權也實智者應與不應唯是一智無變易故名實性智也以性智不迷者即真如心也從本已來離名字相離心緣相也法華云唯此一事實餘二則非真也昔日有學人問南嶽云如鏡鑄像像成後如何師曰不鑑照即迷權實智也又云雖然不鑑照一點也謾他不得即本來智也六祖云七六不生五八寂滅故法華云諸法從本來常自寂滅相是以擊竹聞聲黃鶯啼柳皆非心外有法唯一性智是故不用轉黎耶識名而成圓性之智可不信哉余以少得宗門頭關之旨盡以向外馳求未歸心地豈能破他人之五蘊斷迷性之忘懷今知性相之雙融智性窮源之不二是則痛懺前非洗除咎過是故勸諸來學倘遇明師視如古佛一言得法受用不盡頓超曠劫直至菩提若得心地了明必要看教觀心于自分中乃有交涉若見道而不修者如人有美田而不耕者豈不自惜也夫痛為囑我以年朽勇猛力疾危纏身論義釋用斯勝善利當來速見彌陀極樂佛記室漢川敬録元峯老人增頌五言八識意旨六十四句分為四科初分五識意旨中又二初頌十二句凡情章次頌四句聖果章初頌凡情五識通八識內外同見分見色聞聲處現量緣性境遍行五心所同時內外應八識四惑種觸境生情識是故貪嗔癡五識共相應乃至四空天我種難脫盡次頌聖果擊竹聞聲處頓顯唯識性速轉五識見作智同圓境二分六識意旨中又二初頌十二句凡情章次頌四句聖果章初頌凡情現量通比量比量成帶質帶質有無境轉名獨影境我愛三毒種使動三業行七識三性種熏入八識性均成引滿業異熟果不盡痛哉大丈夫輪回苦不盡次頌聖果頓破無明種通達唯識性妙觀察智中鑑機終不盡三分七識意旨中又二初頌十二句凡情章次頌四句聖果章初頌凡情七識執八識有覆無記性帶質通情本執我量為境情識通內外鈎串六塵影乃至四空天我見種不盡由斯定力故纏眠種不應是故天報盡還八輪回井次頌聖果頓破迷性種淨慧離生性平等淨法界無佛無生性四分八識意旨中又二初頌十二句凡情章次頌四句聖果章初頌凡情第八黎耶識四惑種相應阿羅漢位中四惑始脫盡是故經中說三性三無性虗妄遍計無依他是圓成圓成解脫義虗空六無為顯揚諸法相皆是不動力次頌無漏大圓鏡智中隨眠種脫盡名為無垢識光照大千影總頌八識名數六欲具八識初二禪六識三禪具三識四禪只七八四空有黎耶諸識將盡滅欲界具尋伺二禪伺未息三禪伺將斷四禪全無伺欲界具三欲飲食睡淫欲色界俱脫盡唯以禪為欲四禪有遍行作意受想思七識執八識有覆無記性四空天無覆只有藏識性遍行五心所九次定已滅阿羅漢位中頓破和合識唯留大圓智普照塵剎攝總頌八識轉智意旨八識能分五識見心所圓成現量顯剎那流入意地中比量境中獨影現似真二帶總分清有覆無覆黎耶識若能頓破無明種自性智光常在面八識總頌文終玄祖八識頌在相宗百法明門論內只頌七十種色及心法若百法論頌云色法十一心法八五十一個心所法二十四個不相應六個無為成百法因玄奘始祖只頌前百法中兩句後兩句文未頌在此總頌後補兩句論釋三十法合成前七十法共計一百法也又前二十四個不相應合前七十法共成九十四法是世間法也後一句頌六無為成百法者是出世法非世間法也今先論釋不相應法頌云文句同根名異住得無生滅老無常流不定相時勢速次第數和不合方論中云前七十種色及心法者與實體境上均有本質色故心故今此二十四個俱名不相應者總與色心體上決不相應聖教序中云松風水月未足比其清華等句如前松風等四字有實體境故以立四字而成四名又云未足等六字者即無實體境也是虗詞文義而美玄祖淨妙之德故云未足等句即與松風水月四境色體上不相應耳是故二十四個法者在五蘊中是屬行蘊耳在三性三無性中屬遍計性中所收也如云根本自性非見聞覺知所到故與自性文字不相應者此矣次釋六無為法者一虗空無為二非擇滅無為三滅盡定無為四擇滅無為五真如無為六不動滅無為今初虗空無為者是三十二色法之首領何則三十二法者是有為法也有生滅去來故唯虗空體者無生滅去來故故屬無為法也以無作無為名無為也然此虗空無為還屬第六識中似帶質境若在四禪天處捨念清淨地中即已滅也是故還成事無為也屬遍計性所收耳非屬本性體成凡夫法也二非擇滅無為者以生滅去來善惡等法及前虗空境者不相應故何則非心意識之所見故乃凡夫三乘四果以至如來地中根本自性而為體也故云非擇滅無為法也即三性中圓成實性是聖體法也又前即是虗妄義次是真實性義三滅盡定無為者是小乘九次第定滅却心意識故故屬無為法也三乘遊三摩地亦可借路修非最上乘法也四擇滅無為者即戒定慧等無量出世妙行等法也問既有戒定慧等修者非用生滅心不可云何屬無為法也答由用戒定慧等擇滅法故故能擇去我見愛種滅盡一切煩惱及于隨眠種子始見真如無為妙果也所以云擇滅者屬無為法也問三性中是何性所收答是依他起性即圓成故五真如無為者收前虗空及九次第定兼擇滅無為生滅門又收前非擇滅無為屬不生滅門以此二門不相捨離名真如門真如門者以世出世間等法總唯一心者也是故起信論云凡見一切法者即唯心耳問三性中是何性中收答是三性三無性均收者也六不動無為者亦即五無為總義也今云不動義也是即如來果地金剛性也故云不動義也夫無為法者只一性耳云何要立六無為法也答分體用故恐混外道見故直示一心故又示真如體用全具常不動故由此立六無為法也又問云何要立虗空無為耶答以擇出虗空性非本性故虗空者是吾人心意識之所見也本性者非心意識之所見也本性雖則空而不斷故即非頑空耳問云何要立非擇滅無為耶答由顯凡聖皆依根本自性與一切染法不相應故故單屬凡聖體也問云何要立滅盡定無為耶答前不云乎一切三乘借路修行亦能斷諸我愛種故問云何要立擇滅無為耶答由擇滅無為妙用之力即能轉凡情而成聖位故若無此擇滅者一切聖果德位不能成故問云何要立真如無為者答以攝前四種無為體用同一如故直示一心無二法故問云何要立不動無為耶答以攝前五種無為法者性如金剛心無動故常住法界無變易故故立不動名耳然此六無為法者以一無為者即六無為也又虗空及滅盡無為者即事無礙法界也非擇滅無為者是理無礙法界也真如無為者即事理無礙法界也不動無為者即含事事無礙法界也又云無為者由唯識故而能知也何則曾聞聖典云有六無為道者以往昔中熏習成種今日聞六無為道者以脫然而之有也然則無為道不可以知知況可以識識故云道可云道非有常道之名耳無非暫時云道也今以唯識以識于無為道者是吾人所緣境也然此境者以無境為境始為實際境也故斯境者非大非小非內非外非比量境非現量得故聖人云觸境忘懷者始可以會道矣冥合百法論義文終刻八識論義回向意願附源漳最初參學自性魔毒幾喪慧命苦不可言也到此南方幸遇先師元峯老和尚垂甘露味絶後再蘇遂發大願願我盡未來世如衆生數普現色身具諸妙辨廣讚一乘令諸衆生不入邪見爾來聞法喜法樂法解法不見世間有少急務但願宏法普利羣生時適此論六根清淨一性圓明了無生智慧𦦨重重仰唯護法其首願令佛法久住世間與諸衆生作大饒益字字句句乃至一塵一墨皆如理而遍盡沙界徹未來一切衆生之中字字句句皆如理而攝一切衆生皆入其中願諸衆生皆悟自性法門法爾交涉無礙此論證也願諸捨財助一力隨喜讚歎者生生世世不落三塗常會人天聽聞正法得大總持開化一切普令衆生同圓種智遍攝為衆生者慈願故正而度故三無差別故耳
