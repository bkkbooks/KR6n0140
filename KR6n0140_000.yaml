body:
  text: 八識論義序原夫聖人體用之旨者有性相二義之門也夫性相二門者是真如性中有生滅門有不生滅門也今生滅者是相宗心意識也不生滅者是性宗空體之旨也然則性外無相相外無性是故真如門中生滅與不生滅實無異相之法體也既無異體所以觸境明如若無性相故曰唯心無境若無境者自心誰生故心境泯泯廓然無聖彰大象而不見其形渾太虗而不見其相是故在上不皎其下不昧大包天地細入微塵非色非空非智非識以五目不能覩其形即四辨莫能談其狀故繩繩不可名寂寂不可見迎之不見首隨之不見後鑽之彌堅探之無影微妙玄通深不可識希夷絶朕究不可知噫只可冥之于心契之于神為三藏之祖作十地之宗迷之者化智性而成識色悟之者轉識色而成智性成色識者六道齊彰成智性者即幻有俱寂又齊彰者成黎耶之心王俱寂者捐萬象之形質又心王起則憎愛心所之紛紛藏識空破無明轉識之息息噫若能通唯識之真宗達實相之無境者則不愧於學法之人矣然余自慚無識未入升堂謁究玄宗竭思不已實祈聖之冥加誠叩于歷祖聊為論識以示將來
